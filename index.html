<title>包装部品管理 — Packaging Parts Manager</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #0a0a0a; color: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", system-ui, sans-serif;

    min-height: 100vh; min-height: 100dvh;

  }
  .font-tech { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace; letter-spacing: -0.01em; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    pointer-events: none; z-index: 0;
  }
  .container { position: relative; max-width: 640px; margin: 0 auto; padding-bottom: 120px; }
  .header {
    position: sticky; top: 0; z-index: 10;

  }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2px; gap: 12px; }
  .header-title-wrap { flex: 1; min-width: 0; }

  .meta { font-size: 11px; color: #525252; margin-top: 2px; }

  .menu-btn { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #a3a3a3; transition: all 0.15s; flex-shrink: 0; }

  .menu-btn:active { transform: scale(0.92); }
  .search-wrap { position: relative; }
  .search-wrap svg.icon-search { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: #525252; }
  .search { width: 100%; background: #171717; border: 1px solid #262626; border-radius: 12px; padding: 12px 40px 12px 40px; color: #fafafa; font-size: 14px; outline: none; transition: border-color 0.15s; }

  .icon-btn:hover { background: #171717; }
  .icon-btn.danger:hover { background: rgba(239,68,68,0.1); color: #f87171; }
  .header-title { font-weight: 700; font-size: 18px; }
  .header-actions { margin-left: auto; display: flex; align-items: center; gap: 4px; }
  .list { padding: 16px 20px 0; display: flex; flex-direction: column; gap: 8px; }
  .card { background: #171717; border: 1px solid #262626; border-radius: 12px; overflow: hidden; transition: border-color 0.15s; display: flex; align-items: stretch; }
  .card:hover { border-color: #404040; }
  .card-thumb { flex-shrink: 0; width: 80px; height: 80px; background: #262626; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card-thumb svg { width: 28px; height: 28px; color: #525252; }
  .card-body { flex: 1; min-width: 0; padding: 8px 12px; text-align: left; }

  .card-qty { display: flex; align-items: center; padding-right: 8px; gap: 2px; }

  .empty { text-align: center; padding: 80px 24px 24px; }

  .empty-icon-wrap svg { width: 28px; height: 28px; color: #525252; }

  .fab svg { width: 24px; height: 24px; }

  .qty-input-btn.plus { color: #fb923c; }

  .qty-input { flex: 1; background: transparent; border: none; text-align: center; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace; font-weight: 700; font-size: 20px; color: #fafafa; padding: 12px 0; outline: none; font-variant-numeric: tabular-nums; }

  /* 写真アップロードエリア */

  .desktop-only { display: none; }

  .photo-preview { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid #262626; background: #171717; transition: all 0.15s; }
  .photo-preview.drag-over { border-color: #fb923c; box-shadow: 0 0 0 3px rgba(251,146,60,0.2); }
  .photo-preview img { width: 100%; max-height: 280px; object-fit: contain; display: block; }
  .photo-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 8px; }

  .photo-action svg { width: 14px; height: 14px; }

  /* 詳細画面のギャラリー */

  .gallery-dot.active { background: #fb923c; width: 18px; border-radius: 3px; }

  /* リストカードのマルチ写真インジケータ */
  .card-thumb { position: relative; }

  .ai-search-btn { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #a3a3a3; background: #171717; border: 1px solid #262626; flex-shrink: 0; transition: all 0.15s; }

  /* AI検索結果画面 */
  .ai-result-section { padding: 16px 20px; }
  .ai-query-preview { background: #171717; border: 1px solid #262626; border-radius: 12px; padding: 12px; margin-bottom: 20px; display: flex; gap: 12px; align-items: center; }

  .detail-model { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace; font-size: 14px; color: #fb923c; margin-bottom: 24px; }

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// ⚙️ Firebase設定をここに貼り付けてください
// (Firebase Console → プロジェクト設定 → 全般 → SDK setup から取得)

const firebaseConfig = {

// ═══════════════════════════════════════════════════════════════════

const STORAGE_KEY = 'spare-parts-packaging-v1';   // 旧localStorage用(マイグレーション用に保持)
const SHEETJS_URL = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';

let state = {
  parts: [],
  view: 'list',
  search: '',
  form: emptyForm(),
  selectedId: null,
  confirmDel: false,
  menuOpen: false,
  import: null,
  duplicate: null,

  ai: null,
  displayLimit: 100,

  _backfillingId: null,

  lowStockExpanded: true,    // 在庫不足セクションの展開状態
  openLocations: {},         // 場所別モードで開いているフォルダー: { '場所名': true }
};

// Firebase接続オブジェクト(後で初期化)
let db = null;
let auth = null;
let storage = null;
let unsubscribe = null;

function emptyForm() {
  return { id: null, name: '', model: '', quantity: 0, minQuantity: 0, location: '', notes: '', photos: [], embeddings: [] };
}

// 在庫不足判定: minQuantity が設定されていて(>0)、quantity がそれを下回る場合 true
function isLowStock(p) {
  const min = Number(p.minQuantity) || 0;
  if (min <= 0) return false;
  const qty = Number(p.quantity) || 0;
  return qty < min;
}

// ────── Firebase 初期化 ──────
function isFirebaseConfigured() {
  return firebaseConfig.apiKey && !firebaseConfig.apiKey.includes('YOUR_API_KEY');
}

async function initFirebase() {
  if (!isFirebaseConfigured()) {
    state.view = 'setup';
    state.initialized = true;
    render();
    return;
  }
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();
    try { storage = firebase.storage(); } catch { storage = null; }

    // オフライン対応 (失敗しても無視 - 複数タブ等で発生する想定)
    try { await db.enablePersistence({ synchronizeTabs: true }); } catch {}

    // 匿名サインイン
    try {
      await auth.signInAnonymously();
    } catch (authErr) {
      // よくある失敗をユーザー向けに翻訳
      if (authErr.code === 'auth/admin-restricted-operation' ||
          authErr.code === 'auth/operation-not-allowed') {
        throw new Error('Firebase Console で「Authentication → Sign-in method → Anonymous(匿名)」を有効にしてください');
      }
      if (authErr.code === 'auth/network-request-failed') {
        throw new Error('ネットワーク接続を確認してください');
      }
      throw new Error('認証失敗: ' + (authErr.code || authErr.message));
    }

    // リアルタイム購読開始
    startSync();

    // localStorageからの初回マイグレーション
    await checkMigration();

    state.initialized = true;
  } catch (e) {
    state.syncStatus = 'error';
    state.initialized = true;
    // エラー種別を判定して具体的なガイダンスを出す
    let msg = e.message || '不明なエラー';
    if (/invalid-api-key|invalid api key/i.test(msg)) {
      msg = 'firebaseConfig の apiKey が不正です。index.html の設定を確認してください';
    } else if (/project.*not.*found|invalid.*project/i.test(msg)) {
      msg = 'firebaseConfig の projectId が見つかりません。設定を確認してください';
    }
    flash('接続エラー: ' + msg, 'error');
    render();
  }
}

function startSync() {
  state.syncStatus = 'connecting';
  unsubscribe = db.collection('parts-packaging')
    .orderBy('createdAt', 'desc')
    .onSnapshot(
      (snapshot) => {
        state.parts = snapshot.docs.map(doc => {
          const d = doc.data();
          // 旧形式 photo:string → photos:[string] へマイグレーション(読み取り時)
          let photos = Array.isArray(d.photos) ? d.photos.filter(Boolean) : [];
          if (photos.length === 0 && d.photo) photos = [d.photo];
          const embeddings = mapToEmbs(d.embeddings, photos.length);
          return {
            id: doc.id,
            name: d.name || '',
            model: d.model || '',
            quantity: Number(d.quantity) || 0,
            minQuantity: Number(d.minQuantity) || 0,  // 最低在庫数(未設定なら0=判定対象外)
            location: d.location || '',
            notes: d.notes || '',
            photos: photos,
            embeddings: embeddings,
            createdAt: d.createdAt?.toDate?.()?.toISOString() || null,
            updatedAtMs: d.updatedAt?.toMillis?.() || d.createdAt?.toMillis?.() || 0,
          };
        });
        // 同期ステータス判定:
        // Firestoreの fromCache フラグは「すべてのドキュメントがサーバー確認済み」でないと
        // false にならず、実用的には実際は同期できていても true のままになりがち。
        // そのため、ブラウザの online 状態 + pendingWrites の有無を主な判断材料とする。
        if (!navigator.onLine) {
          state.syncStatus = 'offline';
        } else if (snapshot.metadata.hasPendingWrites) {
          // 書き込み待機中 = サーバーへの反映待ち。接続自体は通常活きている
          state.syncStatus = 'connecting';
        } else {
          // ブラウザがオンラインで保留中書き込みなし = 実質同期済みと判定
          state.syncStatus = 'synced';
        }
        render();
      },
      (error) => {
        state.syncStatus = 'error';
        flash('同期エラー: ' + error.message, 'error');
        render();
      }
    );
}

// ブラウザのオンライン/オフライン状態変化を監視
window.addEventListener('online', () => {
  if (state.syncStatus === 'offline') {
    state.syncStatus = 'synced';
    render();
  }
});
window.addEventListener('offline', () => {
  state.syncStatus = 'offline';
  render();
});

async function checkMigration() {
  const localData = localStorage.getItem(STORAGE_KEY);
  if (!localData) return;
  if (localStorage.getItem(STORAGE_KEY + '_migrated')) return;

  let parts;
  try { parts = JSON.parse(localData); } catch { return; }
  if (!Array.isArray(parts) || parts.length === 0) return;

  // クラウドに既にデータがあるか確認
  const snap = await db.collection('parts-packaging').limit(1).get();
  if (!snap.empty) {
    if (!confirm(`クラウドに既にデータがあります。\nローカルにある${parts.length}件の古いデータも追加で取り込みますか?\n(キャンセル=何もしない)`)) {
      localStorage.setItem(STORAGE_KEY + '_migrated', 'skipped');
      return;
    }
  }

  try {
    // Firestore batchは500件まで - 念のため分割
    for (let i = 0; i < parts.length; i += 400) {
      const batch = db.batch();
      parts.slice(i, i + 400).forEach(p => {
        const ref = db.collection('parts-packaging').doc();
        batch.set(ref, {
          name: p.name || '',
          model: p.model || '',
          quantity: Number(p.quantity) || 0,
          location: p.location || '',
          notes: p.notes || '',
          photos: p.photo ? [p.photo] : (Array.isArray(p.photos) ? p.photos : []),
          embeddings: [],  // 移行時は埋め込み未計算
          createdAt: p.createdAt
            ? firebase.firestore.Timestamp.fromDate(new Date(p.createdAt))
            : firebase.firestore.FieldValue.serverTimestamp(),
        });
      });
      await batch.commit();
    }
    localStorage.setItem(STORAGE_KEY + '_backup', localData);
    localStorage.setItem(STORAGE_KEY + '_migrated', 'true');
    flash(`${parts.length}件のローカルデータをクラウドに移行しました`, 'success');
  } catch (e) {
    flash('移行エラー: ' + e.message, 'error');
  }
}

// ═══════════════════════════════════════════════════════════════════
// データ処理ヘルパー (Firestore制約対応)
// ═══════════════════════════════════════════════════════════════════

// Firestoreは入れ子配列を許さないため、embeddingsをマップに変換
function embsToMap(arr) {
  if (!Array.isArray(arr)) return {};
  const m = {};
  arr.forEach((emb, i) => {
    if (Array.isArray(emb) && emb.length > 0) m[String(i)] = emb;
  });
  return m;
}

// マップ → 配列(写真の枚数分)
function mapToEmbs(obj, photoCount) {
  if (Array.isArray(obj)) return obj;
  const arr = [];
  if (!obj || typeof obj !== 'object') {
    for (let i = 0; i < photoCount; i++) arr.push([]);
    return arr;
  }
  for (let i = 0; i < photoCount; i++) {
    const v = obj[String(i)];
    arr.push(Array.isArray(v) ? v : []);
  }
  return arr;
}

// ドキュメント全体のサイズを推定 (Firestore 1MB制限の事前チェック用)
function estimateDocSize(payload) {
  try { return JSON.stringify(payload).length; }
  catch { return 0; }
}

const FIRESTORE_DOC_SOFT_LIMIT = 850 * 1024;

// ═══════════════════════════════════════════════════════════════════
// HEIC形式対応 (iPhone標準形式) - heic2anyライブラリで動的変換
// ═══════════════════════════════════════════════════════════════════
const HEIC2ANY_URL = 'https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js';
let heic2anyPromise = null;

function loadHeic2any() {
  if (window.heic2any) return Promise.resolve();
  if (heic2anyPromise) return heic2anyPromise;
  heic2anyPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = HEIC2ANY_URL;
    s.onload = resolve;
    s.onerror = () => { heic2anyPromise = null; reject(new Error('HEIC変換ライブラリの読み込み失敗')); };
    document.head.appendChild(s);
  });
  return heic2anyPromise;
}

function isHeicFile(file) {
  if (!file) return false;
  const t = (file.type || '').toLowerCase();
  if (t === 'image/heic' || t === 'image/heif') return true;
  const name = (file.name || '').toLowerCase();
  return /\.(heic|heif)$/.test(name);
}

async function convertHeicToJpeg(file) {
  await loadHeic2any();
  const blob = await window.heic2any({ blob: file, toType: 'image/jpeg', quality: 0.85 });
  // heic2anyは配列を返す場合もある
  const out = Array.isArray(blob) ? blob[0] : blob;
  return new File([out], file.name.replace(/\.(heic|heif)$/i, '.jpg'), { type: 'image/jpeg' });
}

// ═══════════════════════════════════════════════════════════════════
// Firebase Storage 写真アップロード (1MB制限の解消)
// 設定不要: configにstorageBucketがあれば自動利用、なければbase64フォールバック
// ═══════════════════════════════════════════════════════════════════

// dataUrlがBase64データか、Storage URLかを判定
function isDataUrl(s) {
  return typeof s === 'string' && s.startsWith('data:');
}

// Base64データをBlobに変換
function dataUrlToBlob(dataUrl) {
  const [meta, b64] = dataUrl.split(',');
  const mime = (meta.match(/data:([^;]+)/) || [])[1] || 'image/jpeg';
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

// 旧Firebase Storage用フラグ(Cloudinary移行により実質未使用、互換性のため保持)
let storageWorks = null;

// ═══════════════════════════════════════════════════════════════════
// Cloudinary 設定 (画像保存先)
// ═══════════════════════════════════════════════════════════════════
const CLOUDINARY_CLOUD_NAME = 'dbkgnifgv';
const CLOUDINARY_UPLOAD_PRESET = 'parts_unsigned';
const CLOUDINARY_UPLOAD_URL = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`;

let cloudinaryWorks = null;  // null=未確認, true=利用可能, false=利用不可

// 写真をCloudinaryにアップロード → 画像URLを返す
// 失敗時は元のdataUrlをそのまま返す (base64フォールバック - 安全策)
async function uploadPhotoToStorage(dataUrl, partIdHint = '') {
  if (cloudinaryWorks === false) return dataUrl;  // 既知の失敗 → 即スキップ
  if (!isDataUrl(dataUrl)) return dataUrl;  // 既にURLなら何もしない
  try {
    const blob = dataUrlToBlob(dataUrl);
    const formData = new FormData();
    formData.append('file', blob);
    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
    // 10秒タイムアウト
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);
    const response = await fetch(CLOUDINARY_UPLOAD_URL, {
      method: 'POST',
      body: formData,
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    if (!response.ok) throw new Error(`Cloudinary upload failed: ${response.status}`);
    const data = await response.json();
    if (!data.secure_url) throw new Error('Cloudinary response missing URL');
    cloudinaryWorks = true;
    return data.secure_url;
  } catch (e) {
    cloudinaryWorks = false;
    console.warn('Cloudinary unavailable, using base64 fallback:', e.message);
    return dataUrl;
  }
}

// 写真の一括アップロード (新規追加 or 既存の置き換え)
async function uploadPhotos(photos) {
  if (cloudinaryWorks === false) return photos;
  const out = [];
  for (const p of photos) {
    if (isDataUrl(p)) {
      out.push(await uploadPhotoToStorage(p));
    } else {
      out.push(p);  // 既にURL
    }
  }
  return out;
}

// 削除時の処理 (Cloudinaryのunsigned uploadでは削除はAPI Secret必須のためスキップ)
// 容量が逼迫した場合はCloudinaryダッシュボードで手動削除
async function deletePhotoFromStorage(url) {
  // unsigned upload preset では削除権限がないため、URLのみ削除(画像実体はCloudinaryに残る)
  // 必要な場合は、Cloudinaryダッシュボードから手動で削除してください
  return;
}

// ═══════════════════════════════════════════════════════════════════
// ブラウザの戻る・進むボタン対応 (history.pushState ベース)
// ═══════════════════════════════════════════════════════════════════
let _navIgnore = false;  // popstateからの呼び出しを区別

function navigateTo(view, opts = {}) {
  state.view = view;
  if (opts.selectedId !== undefined) state.selectedId = opts.selectedId;
  if (opts.galleryIndex !== undefined) state.galleryIndex = opts.galleryIndex;
  if (!_navIgnore) {
    try {
      history.pushState(
        { view, selectedId: state.selectedId, galleryIndex: state.galleryIndex },
        '',
        '#' + view
      );
    } catch {}
  }
  render();
}

window.addEventListener('popstate', (e) => {
  // モーダルが開いていれば、戻るボタンでまずモーダルを閉じる
  if (state.confirmDel || state.duplicate || state.menuOpen || state.editConflict) {
    state.confirmDel = false;
    state.duplicate = null;
    state.menuOpen = false;
    state.editConflict = null;
    render();
    return;
  }
  _navIgnore = true;
  if (e.state && e.state.view) {
    state.view = e.state.view;
    state.selectedId = e.state.selectedId || null;
    state.galleryIndex = e.state.galleryIndex || 0;
  } else {
    state.view = 'list';
  }
  // フォームから戻る場合は変更を破棄(編集状態も完全にクリア)
  state.form = emptyForm();
  state._formDirty = false;
  state._editStartedAt = 0;
  render();
  _navIgnore = false;
});

// 写真は1MB制限のため少し強めに圧縮 (720px / quality 0.65)
// iOS Safari の File 実体解放問題対策: タイムアウトを設けて永久ハングを防ぐ
function resizeImage(file, maxWidth = 720, quality = 0.65) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    // iOS で稀に reader が永久に応答しないケースに備えてタイムアウト
    const timeout = setTimeout(() => {
      reject(new Error('画像の読み込みがタイムアウトしました (iOS の場合は再起動・再撮影をお試しください)'));
    }, 15000);
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        clearTimeout(timeout);
        const canvas = document.createElement('canvas');
        const ratio = Math.min(1, maxWidth / img.width);
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => { clearTimeout(timeout); reject(new Error('画像のデコード失敗')); };
      img.src = e.target.result;
    };
    reader.onerror = () => { clearTimeout(timeout); reject(new Error('ファイルの読み込み失敗')); };
    reader.readAsDataURL(file);
  });
}

// ═══════════════════════════════════════════════════════════════════
// AI画像検索 (TensorFlow.js + MobileNet)
// 初回のみ約5MBのモデルダウンロードあり、以降はキャッシュ
// ═══════════════════════════════════════════════════════════════════
const TFJS_URL = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js';
const MOBILENET_URL = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js';

let mobileNetModel = null;
let mobileNetPromise = null;

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('スクリプト読み込み失敗: ' + src));
    document.head.appendChild(s);
  });
}

async function loadMobileNet() {
  if (mobileNetModel) return mobileNetModel;
  if (mobileNetPromise) return mobileNetPromise;
  mobileNetPromise = (async () => {
    if (!window.tf) await loadScript(TFJS_URL);
    if (!window.mobilenet) await loadScript(MOBILENET_URL);
    // alpha=0.5: 軽量バージョン (約5MB)。alpha=1.0は精度高いが17MB
    mobileNetModel = await window.mobilenet.load({ version: 2, alpha: 0.5 });
    return mobileNetModel;
  })();
  return mobileNetPromise;
}

// 画像のdata URLから1280次元の特徴ベクトルを計算
// Storage URLが渡された場合は、CORS問題を避けるため fetch経由でdataUrlに変換してから処理
async function computeEmbedding(srcUrl) {
  const model = await loadMobileNet();
  // Storage URLの場合: fetchでblob取得→dataUrlに変換(CORS taintedを回避)
  let dataUrl = srcUrl;
  if (!isDataUrl(srcUrl)) {
    try {
      const resp = await fetch(srcUrl);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const blob = await resp.blob();
      dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('blob読込失敗'));
        reader.readAsDataURL(blob);
      });
    } catch (e) {
      throw new Error('画像取得失敗: ' + e.message);
    }
  }
  const img = new Image();
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = () => reject(new Error('画像の読み込み失敗'));
    img.src = dataUrl;
  });
  // model.infer(img, true) で分類前の埋め込みベクトルを取得
  const tensor = model.infer(img, true);
  const data = await tensor.data();
  tensor.dispose();
  // Float32Array → 通常配列に変換し小数点以下を切り詰め(Firestore保存量削減)
  return Array.from(data).map(v => Math.round(v * 10000) / 10000);
}

// コサイン類似度
function cosineSimilarity(a, b) {
  if (!a || !b || a.length === 0 || b.length === 0) return 0;
  let dot = 0, normA = 0, normB = 0;
  const len = Math.min(a.length, b.length);
  for (let i = 0; i < len; i++) {
    dot += a[i] * b[i];
    normA += a[i] * a[i];
    normB += b[i] * b[i];
  }
  if (normA === 0 || normB === 0) return 0;
  return dot / (Math.sqrt(normA) * Math.sqrt(normB));
}

// 検索画像とDB内全部品の各写真を比較し、類似度でソート
function rankBySimilarity(queryEmb, parts) {
  const ranked = [];
  for (const p of parts) {
    if (!Array.isArray(p.embeddings) || p.embeddings.length === 0) continue;
    let maxSim = -1;
    for (const emb of p.embeddings) {
      if (!Array.isArray(emb) || emb.length === 0) continue;
      const sim = cosineSimilarity(queryEmb, emb);
      if (sim > maxSim) maxSim = sim;
    }
    if (maxSim > 0) ranked.push({ part: p, similarity: maxSim });
  }
  ranked.sort((a, b) => b.similarity - a.similarity);
  return ranked.slice(0, 10);  // 上位10件
}

// AI検索の起動: ファイル選択 → 解析 → 結果表示
async function runAiSearch(file) {
  if (!file) {
    flash('画像ファイルを選択してください', 'error');
    return;
  }
  // HEIC形式を検出して変換 (iPhone)
  if (isHeicFile(file)) {
    flash('HEIC画像を変換中…');
    try {
      file = await convertHeicToJpeg(file);
    } catch (e) {
      flash('HEIC変換失敗: ' + e.message, 'error');
      return;
    }
  }
  if (!file.type.startsWith('image/')) {
    flash('画像ファイルを選択してください', 'error');
    return;
  }
  state.ai = { phase: 'analyzing', query: '', results: [], error: null };
  navigateTo('ai-search');
  try {
    const dataUrl = await resizeImage(file);
    state.ai.query = dataUrl;
    render();
    const emb = await computeEmbedding(dataUrl);
    // 既存部品で埋め込みがあるものを対象に検索
    const candidates = state.parts.filter(p => Array.isArray(p.embeddings) && p.embeddings.some(e => Array.isArray(e) && e.length > 0));
    if (candidates.length === 0) {
      state.ai.phase = 'done';
      state.ai.error = '検索可能な部品がありません。\n各部品に写真を追加すると、自動的にAI検索の対象になります。';
      render();
      return;
    }
    state.ai.results = rankBySimilarity(emb, candidates);
    state.ai.phase = 'done';
    render();
  } catch (e) {
    state.ai.phase = 'done';
    state.ai.error = 'AI解析エラー: ' + e.message;
    render();
  }
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

}

  );

// CSV parser
function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i + 1] === '\n') i++;
        row.push(field); field = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if (field !== '' || row.length > 0) { row.push(field); rows.push(row); }
  return rows;
}

function csvCell(v) {
  const s = String(v == null ? '' : v);
  if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function buildCSV() {
  const headers = ['部品名', '型式', '個数', '最低在庫数', '設置場所', 'メモ', '登録日'];
  const lines = [headers.join(',')];
  state.parts.forEach(p => {
    lines.push([
      p.name || '', p.model || '', p.quantity || 0, p.minQuantity || 0,
      p.location || '', p.notes || '',
      p.createdAt ? new Date(p.createdAt).toLocaleDateString('ja-JP') : ''
    ].map(csvCell).join(','));
  });
  return '\uFEFF' + lines.join('\r\n');
}

const COLUMN_ALIASES = {
  name: ['部品名', '品名', '名前', '名称', 'name', 'part name', 'part_name'],
  model: ['型式', '型番', '品番', 'model', 'model no', 'model_no', 'part no', 'part_no'],
  quantity: ['個数', '数量', '在庫', '在庫数', 'quantity', 'qty', 'count', 'stock'],
  minQuantity: ['最低在庫数', '最低個数', '最低', '最低数', '最小在庫', '最小', 'min', 'minimum', 'min_quantity', 'minQuantity', 'min stock'],
  location: ['設置場所', '保管場所', '場所', '棚番', 'location', 'place', 'storage'],
  notes: ['メモ', '備考', 'コメント', 'notes', 'note', 'remark', 'memo']
};

function detectColumn(header) {
  const h = String(header).trim().toLowerCase();
  for (const [field, aliases] of Object.entries(COLUMN_ALIASES)) {
    if (aliases.some(a => a.toLowerCase() === h)) return field;
  }
  return null;
}

function buildMapping(headers) {
  return headers.map(h => detectColumn(h));
}

// SheetJS lazy load
let sheetJSPromise = null;
function loadSheetJS() {
  if (window.XLSX) return Promise.resolve();
  if (sheetJSPromise) return sheetJSPromise;
  sheetJSPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = SHEETJS_URL;
    s.onload = () => resolve();
    s.onerror = () => {
      sheetJSPromise = null;
      reject(new Error('Excel機能の読み込みに失敗 (初回はオンライン必要)'));
    };
    document.head.appendChild(s);
  });
  return sheetJSPromise;
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function exportCSV() {
  if (state.parts.length === 0) { flash('登録されている部品がありません', 'error'); return; }
  const csv = buildCSV();
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  downloadBlob(blob, `包装部品リスト_${getDateStr()}.csv`);

async function handleImportFile(file) {
  if (!file) return;
  const fileName = file.name;
  const lower = fileName.toLowerCase();
  let rows = [];
  let sourceFmt = '';
  try {
    if (lower.endsWith('.csv')) {
      const text = await file.text();
      rows = parseCSV(text);
      sourceFmt = 'CSV';
    } else if (lower.endsWith('.xlsx') || lower.endsWith('.xls')) {
      flash('Excelファイル読み込み中...');
      await loadSheetJS();
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
      sourceFmt = 'Excel';
    } else {
      flash('CSVまたはExcelファイルを選択してください', 'error');
      return;
    }
  } catch (e) {
    flash('ファイル読み込みエラー: ' + e.message, 'error');
    return;
  }
  if (rows.length < 1) { flash('ファイルが空です', 'error'); return; }
  const headers = rows[0].map(h => String(h || '').trim());
  const dataRows = rows.slice(1).filter(r => r.some(c => String(c).trim() !== ''));
  if (dataRows.length === 0) { flash('データ行が見つかりません', 'error'); return; }
  const mapping = buildMapping(headers);
  if (!mapping.includes('name') && !mapping.includes('model')) {
    flash('「部品名」または「型式」列が見つかりません', 'error');
    return;
  }
  state.import = { fileName, sourceFmt, headers, rows: dataRows, mapping, mode: 'merge' };
  state.menuOpen = false;
  navigateTo('import');
}

function rowsToParts(rows, mapping) {
  return rows.map(row => {
    const p = { name: '', model: '', quantity: 0, minQuantity: 0, location: '', notes: '', photos: [], embeddings: [] };
    mapping.forEach((field, idx) => {
      if (!field) return;
      const raw = row[idx];
      const v = (raw == null ? '' : String(raw)).trim();
      if (field === 'quantity' || field === 'minQuantity') {
        const n = parseInt(v.replace(/[^0-9-]/g, ''), 10);
        p[field] = isNaN(n) ? 0 : Math.max(0, n);
      } else {
        p[field] = v;
      }
    });
    return p;
  }).filter(p => p.name || p.model);
}

async function executeImport() {
  const imp = state.import;
  if (!imp) return;
  const newParts = rowsToParts(imp.rows, imp.mapping);
  let added = 0, updated = 0, replaced = 0;
  const total = newParts.length;

  flash(`インポート開始… (${total}件)`);

  try {
    if (imp.mode === 'add') {
      // 400件ごとにバッチ
      for (let i = 0; i < newParts.length; i += 400) {
        const batch = db.batch();
        newParts.slice(i, i + 400).forEach(p => {
          const ref = db.collection('parts-packaging').doc();
          batch.set(ref, {
            name: p.name || '', model: p.model || '',
            quantity: Number(p.quantity) || 0,
            minQuantity: Number(p.minQuantity) || 0,
            location: p.location || '', notes: p.notes || '', photos: [], embeddings: [],
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          added++;
        });
        await batch.commit();
        if (total > 100) flash(`登録中… ${Math.min(i + 400, total)} / ${total}`);
      }
    } else if (imp.mode === 'replace') {
      // 既存を全削除してから追加
      flash('既存データを削除中…');
      const all = await db.collection('parts-packaging').get();
      for (let i = 0; i < all.docs.length; i += 400) {
        const batch = db.batch();
        all.docs.slice(i, i + 400).forEach(d => batch.delete(d.ref));
        await batch.commit();
      }
      for (let i = 0; i < newParts.length; i += 400) {
        const batch = db.batch();
        newParts.slice(i, i + 400).forEach(p => {
          const ref = db.collection('parts-packaging').doc();
          batch.set(ref, {
            name: p.name || '', model: p.model || '',
            quantity: Number(p.quantity) || 0,
            minQuantity: Number(p.minQuantity) || 0,
            location: p.location || '', notes: p.notes || '', photos: [], embeddings: [],
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
        });
        await batch.commit();
        if (total > 100) flash(`登録中… ${Math.min(i + 400, total)} / ${total}`);
      }
      replaced = newParts.length;
    } else {
      // マージ: 既存照合 (1件ずつ - Firestore round-tripが必要)
      let processed = 0;
      for (const p of newParts) {
        let found = null;
        if (p.model) found = state.parts.find(x => x.model && x.model.toLowerCase() === p.model.toLowerCase());
        if (!found && p.name) found = state.parts.find(x => !x.model && x.name && x.name.toLowerCase() === p.name.toLowerCase());
        if (found) {
          const updateData = { updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
          if (p.name) updateData.name = p.name;
          if (p.quantity !== undefined) updateData.quantity = Number(p.quantity) || 0;
          if (p.minQuantity !== undefined && p.minQuantity > 0) updateData.minQuantity = Number(p.minQuantity) || 0;
          if (p.location) updateData.location = p.location;
          if (p.notes) updateData.notes = p.notes;
          await db.collection('parts-packaging').doc(found.id).update(updateData);
          updated++;
        } else {
          await db.collection('parts-packaging').add({
            name: p.name || '', model: p.model || '',
            quantity: Number(p.quantity) || 0,
            minQuantity: Number(p.minQuantity) || 0,
            location: p.location || '', notes: p.notes || '', photos: [], embeddings: [],
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          added++;
        }
        processed++;
        if (total > 50 && processed % 25 === 0) {
          flash(`照合・登録中… ${processed} / ${total}`);
        }
      }
    }

    state.import = null;
    let msg;
    if (imp.mode === 'replace') msg = `${replaced}件で全置換しました`;
    else if (imp.mode === 'add') msg = `${added}件を追加しました`;
    else msg = `${updated}件更新 / ${added}件追加`;
    flash(msg, 'success');
    navigateTo('list');
  } catch (e) {
    flash('インポートエラー: ' + e.message, 'error');
  }
}

function render() {
  const app = document.getElementById('app');
  if (!state.initialized) {
    app.innerHTML = `<div style="padding:80px 24px;text-align:center;color:#737373;">
      <div class="loader" style="margin:0 auto 16px;width:24px;height:24px;border-width:3px;"></div>
      接続中...
    </div>`;
    return;
  }
  if (state.view === 'setup') { app.innerHTML = renderSetup(); return; }
  if (state.view === 'list') { app.innerHTML = renderList(); bindListEvents(); }
  else if (state.view === 'form') { app.innerHTML = renderForm(); bindFormEvents(); }
  else if (state.view === 'detail') { app.innerHTML = renderDetail(); bindDetailEvents(); }
  else if (state.view === 'import') { app.innerHTML = renderImport(); bindImportEvents(); }
  else if (state.view === 'ai-search') { app.innerHTML = renderAiSearch(); bindAiSearchEvents(); }

  document.querySelector('.modal-overlay')?.remove();
  document.querySelector('.sheet-overlay')?.remove();
  if (state.confirmDel) {
    document.body.insertAdjacentHTML('beforeend', renderModal());
    bindModalEvents();
  }
  if (state.duplicate) {
    document.body.insertAdjacentHTML('beforeend', renderDuplicateModal());
    bindDuplicateModalEvents();
  }
  if (state.editConflict) {
    document.body.insertAdjacentHTML('beforeend', renderConflictModal());
    bindConflictModalEvents();
  }
  if (state.menuOpen) {
    document.body.insertAdjacentHTML('beforeend', renderMenuSheet());
    bindMenuEvents();
  }
}

  document.getElementById('dup-goto').addEventListener('click', () => {
    const dupId = state.duplicate.id;

    state.duplicate = null;
    doSave();
  });
}

// リスト本体のレンダリング(フラット表示 or 場所別グループ表示)
function renderListBody(filtered) {
  if (filtered.length === 0) return renderEmpty();
  const limit = state.displayLimit || 100;

  if (state.viewMode === 'byLocation') {
    // 場所別フォルダー表示
    const groups = new Map();
    for (const p of filtered) {
      const loc = (p.location || '').trim() || '(場所未設定)';
      if (!groups.has(loc)) groups.set(loc, []);
      groups.get(loc).push(p);
    }
    // 場所名でソート(未設定は最後)
    const sortedKeys = [...groups.keys()].sort((a, b) => {
      if (a === '(場所未設定)') return 1;
      if (b === '(場所未設定)') return -1;
      return a.localeCompare(b, 'ja');
    });

    if (sortedKeys.length === 0) {
      return `<div class="no-locations-msg"><svg><use href="#i-folder"/></svg><div>該当する場所がありません</div></div>`;
    }

    // 検索中はフォルダーを自動展開して該当部品を見せる
    const searchActive = !!state.search.trim();

    // 全展開/全折りたたみボタン
    const allOpen = sortedKeys.every(k => state.openLocations[k]);
    const controlsHtml = sortedKeys.length > 1 ? `
      <div class="folder-controls">
        <button class="folder-control-btn" data-action="${allOpen ? 'collapse-all' : 'expand-all'}">
          ${allOpen ? '▲ 全て折りたたむ' : '▼ 全て展開する'}
        </button>
      </div>
    ` : '';

    return controlsHtml + sortedKeys.map(loc => {
      const parts = groups.get(loc);
      const isOpen = searchActive || !!state.openLocations[loc];
      const hasLowStock = parts.some(isLowStock);
      const lowStockCount = parts.filter(isLowStock).length;
      return `
        <div class="location-folder ${isOpen ? 'open' : ''} ${hasLowStock ? 'has-low-stock' : ''}">
          <div class="folder-head" data-location="${esc(loc)}" role="button" tabindex="0">
            <svg class="folder-icon"><use href="#${isOpen ? 'i-folder-open' : 'i-folder'}"/></svg>
            <span class="folder-name">${esc(loc)}</span>
            ${hasLowStock ? `<span class="folder-low-pill">⚠ ${lowStockCount}件</span>` : ''}
            <span class="folder-count">${parts.length}件</span>
            <svg class="folder-chev"><use href="#i-chev-r"/></svg>
          </div>
          ${isOpen ? `
            <div class="folder-body">
              ${parts.map(p => renderCard(p)).join('')}
            </div>
          ` : ''}
        </div>
      `;
    }).join('');
  }

  // フラット表示(従来の挙動)
  const visible = filtered.slice(0, limit);
  const hasMore = filtered.length > limit;
  return visible.map(p => renderCard(p)).join('') + (hasMore ? `
    <div style="padding: 16px 0 24px; text-align: center;">
      <button class="photo-btn" id="load-more-btn" style="background: #171717; border: 1px solid #262626;">
        もっと見る (${visible.length} / ${filtered.length} 件表示中)
      </button>
    </div>
  ` : (filtered.length > 30 ? `
    <div style="padding: 16px 0 24px; text-align: center; font-size: 11px; color: #525252; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;">
      ${filtered.length} 件すべて表示
    </div>
  ` : ''));
}

function renderCard(p, opts = {}) {
  const firstPhoto = p.photos && p.photos[0];
  const photoCount = p.photos ? p.photos.length : 0;
  const lowStock = isLowStock(p);
  const minQ = Number(p.minQuantity) || 0;
  return `
    <div class="card ${lowStock ? 'low-stock' : ''}" data-id="${p.id}">
      <button class="card-thumb card-tap" data-id="${p.id}">
        ${firstPhoto ? `<img src="${firstPhoto}" alt="${esc(p.name)}" loading="lazy" decoding="async">` : `<svg><use href="#i-pkg"/></svg>`}
        ${photoCount > 1 ? `<div class="photo-badge">+${photoCount - 1}</div>` : ''}
        ${opts.similarity != null ? `<div class="similarity-badge ${opts.similarity > 0.7 ? 'high' : (opts.similarity < 0.4 ? 'low' : '')}">${Math.round(opts.similarity * 100)}%</div>` : ''}
      </button>
      <button class="card-body card-tap" data-id="${p.id}">
        <div class="card-name ${!p.name ? 'empty' : ''}">${p.name ? esc(p.name) : '(無題)'}${lowStock ? '<span class="card-low-badge">⚠ 不足</span>' : ''}</div>
        <div class="card-model font-tech">${p.model ? esc(p.model) : '—'}${minQ > 0 ? `<span class="card-min-info">最低 ${minQ}</span>` : ''}</div>
        ${p.location ? `<div class="card-loc"><svg><use href="#i-pin"/></svg><span>${esc(p.location)}</span></div>` : ''}
      </button>
      <div class="card-qty">
        <button class="qty-btn minus" data-id="${p.id}" data-delta="-1"><svg width="16" height="16"><use href="#i-minus"/></svg></button>
        <div class="qty-num">${p.quantity || 0}</div>

  `;
}

function renderImport() {

  parts.forEach(p => {
    let found = null;
    if (p.model) found = state.parts.find(x => x.model && x.model.toLowerCase() === p.model.toLowerCase());
    if (!found && p.name) found = state.parts.find(x => !x.model && x.name && x.name.toLowerCase() === p.name.toLowerCase());
    if (found) mergeUpdate++; else mergeAdd++;
  });
  const preview = imp.rows.slice(0, 5);
  const labels = { name: '部品名', model: '型式', quantity: '個数', minQuantity: '最低在庫数', location: '設置場所', notes: 'メモ' };

        ` : ''}

    </div>
  `;
}

          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });

function bindFormEvents() {
  const f = state.form;
  document.getElementById('cancel-btn').addEventListener('click', () => {
    if (state._formDirty) {
      if (!confirm('未保存の変更があります。破棄しますか?')) return;
    }
    const target = f.id ? 'detail' : 'list';
    state.form = emptyForm();
    state._formDirty = false;
    state._editStartedAt = 0;
    navigateTo(target);
  });
  document.getElementById('save-btn').addEventListener('click', saveCurrentForm);
  // 入力変更を全て dirty フラグに反映
  const markDirty = () => { state._formDirty = true; };
  document.getElementById('f-name').addEventListener('input', e => { f.name = e.target.value; markDirty(); });
  document.getElementById('f-model').addEventListener('input', e => { f.model = e.target.value; markDirty(); });
  document.getElementById('f-loc').addEventListener('input', e => { f.location = e.target.value; markDirty(); });
  document.getElementById('f-notes').addEventListener('input', e => { f.notes = e.target.value; markDirty(); });
  const qtyInput = document.getElementById('f-qty');
  qtyInput.addEventListener('input', e => {
    // 整数のみ、0以上にクランプ
    const n = parseInt(e.target.value, 10);
    f.quantity = isNaN(n) ? 0 : Math.max(0, n);
    // 不正な入力は表示も修正
    if (String(f.quantity) !== e.target.value && e.target.value !== '') {
      e.target.value = String(f.quantity);
    }
    markDirty();
  });
  document.getElementById('q-minus').addEventListener('click', () => {
    f.quantity = Math.max(0, (Number(f.quantity) || 0) - 1);
    qtyInput.value = f.quantity;
    markDirty();
  });
  document.getElementById('q-plus').addEventListener('click', () => {
    f.quantity = (Number(f.quantity) || 0) + 1;
    qtyInput.value = f.quantity;
    markDirty();
  });

  // 最低在庫数の入力ハンドラ
  const minQtyInput = document.getElementById('f-min-qty');
  minQtyInput.addEventListener('input', e => {
    const n = parseInt(e.target.value, 10);
    f.minQuantity = isNaN(n) ? 0 : Math.max(0, n);
    if (String(f.minQuantity) !== e.target.value && e.target.value !== '') {
      e.target.value = String(f.minQuantity);
    }
    markDirty();
  });
  document.getElementById('min-q-minus').addEventListener('click', () => {
    f.minQuantity = Math.max(0, (Number(f.minQuantity) || 0) - 1);
    minQtyInput.value = f.minQuantity;
    markDirty();
  });
  document.getElementById('min-q-plus').addEventListener('click', () => {
    f.minQuantity = (Number(f.minQuantity) || 0) + 1;
    minQtyInput.value = f.minQuantity;
    markDirty();
  });

  // ────── 写真処理 (新UX) ──────
  const cameraInput = document.getElementById('photo-camera-input');
  const libraryInput = document.getElementById('photo-library-input');

  // dataUrlで写真を特定して埋め込みを設定 (添付・削除で位置が変わっても正しい場所に書き込む)
  async function attachPhoto(file) {
    if (!file) return;
    // HEIC形式(iPhone標準)を検出してJPEGに変換
    if (isHeicFile(file)) {
      flash('HEIC画像を変換中…');
      try {
        file = await convertHeicToJpeg(file);
      } catch (e) {
        flash('HEIC変換に失敗: ' + e.message, 'error');
        return;
      }
    }
    if (!file.type.startsWith('image/')) {
      flash('画像ファイルを選択してください (JPEG / PNG / WebP / HEIC)', 'error');
      return;
    }
    if (!Array.isArray(f.photos)) f.photos = [];
    if (!Array.isArray(f.embeddings)) f.embeddings = [];
    if (f.photos.length >= 5) {
      flash('写真は最大5枚までです', 'error');
      return;
    }
    let dataUrl;
    try {
      dataUrl = await resizeImage(file);
    } catch {
      flash('写真の読み込みに失敗', 'error');
      return;
    }
    f.photos.push(dataUrl);
    f.embeddings.push([]);
    state._formDirty = true;
    render();
    // 埋め込みを非同期で計算 - 写真をdataUrlで特定し、削除・並び替えに耐える
    try {
      const emb = await computeEmbedding(dataUrl);
      const idx = f.photos.indexOf(dataUrl);
      if (idx >= 0 && f.embeddings[idx]) {
        f.embeddings[idx] = emb;
      }
    } catch (e) {
      console.warn('Embedding failed:', e);
    }
  }

  // 複数ファイルを順次追加
  async function attachPhotos(files) {
    if (!files || files.length === 0) return;
    const arr = Array.from(files);
    for (const file of arr) {
      if ((f.photos || []).length >= 5) {
        flash('写真は最大5枚までです', 'error');
        break;
      }
      await attachPhoto(file);
    }
  }

  // iOS WebKit対策: value のクリアを処理の「後」に移動
  // 早すぎるクリアは File 実体を解放させ、後続の FileReader が永久に応答しない
  cameraInput.addEventListener('change', async (e) => {
    const input = e.target;
    const files = input.files;
    if (files && files.length > 0) {
      await attachPhotos(files);
    }
    input.value = '';  // 処理完了後にリセット
  });
  libraryInput.addEventListener('change', async (e) => {
    const input = e.target;
    const files = input.files;
    if (files && files.length > 0) {
      await attachPhotos(files);
    }
    input.value = '';  // 処理完了後にリセット
  });

  // 空状態のボタンと「+ 追加」タイル
  document.getElementById('photo-camera-btn')?.addEventListener('click', () => cameraInput.click());
  document.getElementById('photo-library-btn')?.addEventListener('click', () => libraryInput.click());
  document.getElementById('photo-add-tile')?.addEventListener('click', () => libraryInput.click());
  document.getElementById('photo-add-camera-tile')?.addEventListener('click', () => cameraInput.click());

  // 各サムネイルの削除ボタン
  document.querySelectorAll('.photo-tile .remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx, 10);
      if (Array.isArray(f.photos)) f.photos.splice(idx, 1);
      if (Array.isArray(f.embeddings)) f.embeddings.splice(idx, 1);
      state._formDirty = true;
      render();
    });
  });

  // ────── ドラッグ&ドロップ ──────
  const dropZone = document.getElementById('photo-drop-zone');
  if (dropZone) {
    let dragCounter = 0;
    dropZone.addEventListener('dragenter', (e) => {
      e.preventDefault();
      dragCounter++;
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dragCounter--;
      if (dragCounter <= 0) {
        dragCounter = 0;
        dropZone.classList.remove('drag-over');
      }
    });
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dragCounter = 0;
      dropZone.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files && files.length > 0) attachPhotos(files);
    });
  }
}

function findDuplicate(f) {
  // 編集時は自分自身を除外
  const others = state.parts.filter(p => p.id !== f.id);
  // 型式で照合(優先・大文字小文字無視)
  if (f.model && f.model.trim()) {
    const dup = others.find(p => p.model && p.model.trim().toLowerCase() === f.model.trim().toLowerCase());
    if (dup) return dup;
  }
  // 型式なしの場合は部品名で照合
  if (f.name && f.name.trim() && !f.model.trim()) {
    const dup = others.find(p =>
      !p.model && p.name && p.name.trim().toLowerCase() === f.name.trim().toLowerCase()
    );
    if (dup) return dup;
  }
  return null;
}

function saveCurrentForm() {
  const f = state.form;
  if (!f.name.trim() && !f.model.trim()) {
    flash('部品名または型式を入力してください', 'error');
    return;
  }
  // 重複チェック (新規・編集どちらでも実行)
  const dup = findDuplicate(f);
  if (dup) {
    state.duplicate = dup;
    render();
    return;
  }
  doSave();
}

async function doSave(forceOverwrite = false) {
  const f = state.form;

  // 二重保存防止
  if (state._saving) return;
  state._saving = true;
  const saveBtn = document.getElementById('save-btn');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.style.opacity = '0.5'; saveBtn.innerHTML = '<svg><use href="#i-save"/></svg>保存中…'; }

  try {
    // ① 写真をCloudinaryにアップロード (失敗時は自動的にbase64保存にフォールバック)
    if (cloudinaryWorks !== false && Array.isArray(f.photos) && f.photos.some(isDataUrl)) {
      if (saveBtn) saveBtn.innerHTML = '<svg><use href="#i-save"/></svg>写真を処理中…';
      f.photos = await uploadPhotos(f.photos);
    }

    // ② 入力値のトリム
    const cleanName = (f.name || '').trim();
    const cleanModel = (f.model || '').trim();
    const cleanLoc = (f.location || '').trim();
    const cleanNotes = (f.notes || '').trim();
    const cleanQty = Math.max(0, Math.floor(Number(f.quantity) || 0));
    const cleanMinQty = Math.max(0, Math.floor(Number(f.minQuantity) || 0));

    const payload = {
      name: cleanName,
      model: cleanModel,
      quantity: cleanQty,
      minQuantity: cleanMinQty,
      location: cleanLoc,
      notes: cleanNotes,
      photos: f.photos || [],
      embeddings: embsToMap(f.embeddings),
    };

    // ③ Firestoreサイズチェック (1MB制限の事前検知)
    const size = estimateDocSize(payload);
    if (size > FIRESTORE_DOC_SOFT_LIMIT) {
      throw new Error(`データサイズが大きすぎます (${Math.round(size/1024)}KB)。写真を減らしてください。`);
    }

    if (f.id) {
      // ④ 同時編集の競合検出 (Firestoreトランザクション使用)
      if (saveBtn) saveBtn.innerHTML = '<svg><use href="#i-save"/></svg>保存中…';
      // 編集前の写真一覧を保持(削除された写真をStorageから消すため)
      const oldPart = state.parts.find(x => x.id === f.id);
      const oldPhotos = (oldPart && Array.isArray(oldPart.photos)) ? [...oldPart.photos] : [];
      const docRef = db.collection('parts-packaging').doc(f.id);
      const editStartedAt = state._editStartedAt || 0;
      await db.runTransaction(async (tx) => {
        const snap = await tx.get(docRef);
        if (!snap.exists) {
          throw new Error('この部品は他のユーザーに削除されました');
        }
        const serverData = snap.data();
        const serverUpdatedMs = serverData.updatedAt?.toMillis?.() || 0;
        if (!forceOverwrite && serverUpdatedMs > editStartedAt && editStartedAt > 0) {
          // 競合検出 → ユーザーに判断を仰ぐ
          throw new Error('CONFLICT');
        }
        tx.update(docRef, {
          ...payload,
          photo: firebase.firestore.FieldValue.delete(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      });
      // 編集で削除された写真をStorageからも消す(ベストエフォート、非同期で実行)
      const newPhotosSet = new Set(payload.photos);
      for (const oldUrl of oldPhotos) {
        if (!newPhotosSet.has(oldUrl)) {
          deletePhotoFromStorage(oldUrl);  // fire-and-forget
        }
      }
      flash('更新しました', 'success');
      state.selectedId = f.id;
      navigateTo('detail');
    } else {
      await db.collection('parts-packaging').add({
        ...payload,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      flash('登録しました', 'success');
      navigateTo('list');
    }
    state.form = emptyForm();
    state.duplicate = null;
    state._formDirty = false;
    state._editStartedAt = 0;
  } catch (e) {
    if (e.message === 'CONFLICT') {
      // 競合モーダルを表示してユーザーに判断を任せる
      state.editConflict = { partId: f.id };
      render();
    } else {
      flash('保存エラー: ' + e.message, 'error');
    }
  } finally {
    state._saving = false;
    if (saveBtn) { saveBtn.disabled = false; saveBtn.style.opacity = ''; saveBtn.innerHTML = '<svg><use href="#i-save"/></svg>保存'; }
  }
}

function bindDetailEvents() {

        embeddings: Array.isArray(p.embeddings) ? p.embeddings.map(e => [...e]) : []
      };
      // 編集開始時点のサーバー側更新時刻を記録(クライアント時計に依存しない競合検出)
      state._editStartedAt = p.updatedAtMs || 0;
      state._formDirty = false;

    }
  });
  document.getElementById('delete-btn').addEventListener('click', () => {

  const p = state.parts.find(x => x.id === state.selectedId);
  const photoLen = p?.photos?.length || 0;
  document.getElementById('gallery-prev')?.addEventListener('click', () => {
    state.galleryIndex = (state.galleryIndex - 1 + photoLen) % photoLen;
    render();
  });
  document.getElementById('gallery-next')?.addEventListener('click', () => {
    state.galleryIndex = (state.galleryIndex + 1) % photoLen;
    render();
  });
  document.querySelectorAll('.qty-circle-btn').forEach(el => {
    el.addEventListener('click', async () => {
      const delta = parseInt(el.dataset.delta, 10);
      const p = state.parts.find(x => x.id === state.selectedId);
      if (!p) return;
      if (delta < 0 && (Number(p.quantity) || 0) <= 0) return;
      const newQty = Math.max(0, (Number(p.quantity) || 0) + delta);
      p.quantity = newQty;
      document.querySelector('.qty-display').textContent = newQty;
      try {
        await db.collection('parts-packaging').doc(state.selectedId).update({
          quantity: firebase.firestore.FieldValue.increment(delta),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      } catch (err) {
        flash('個数更新エラー: ' + err.message, 'error');
      }
    });
  });

  // 埋め込み未計算の写真がある場合、バックグラウンドで自動計算 (移行データ対応)
  // ユーザーが詳細画面を開いた時に走り、AI検索の対象になる
  if (p && Array.isArray(p.photos) && p.photos.length > 0) {
    const needsBackfill = p.photos.some((_, i) =>
      !Array.isArray(p.embeddings?.[i]) || p.embeddings[i].length === 0
    );
    if (needsBackfill && !state._backfillingId) {
      state._backfillingId = p.id;
      backfillEmbeddings(p).finally(() => { state._backfillingId = null; });
    }
  }
}

// 既存部品の写真にAI埋め込みを後付けで計算してFirestoreに保存
async function backfillEmbeddings(part) {
  const newEmbs = Array.isArray(part.embeddings) ? [...part.embeddings] : [];
  let updated = false;
  for (let i = 0; i < part.photos.length; i++) {
    if (Array.isArray(newEmbs[i]) && newEmbs[i].length > 0) continue;
    try {
      const emb = await computeEmbedding(part.photos[i]);
      newEmbs[i] = emb;
      updated = true;
    } catch (e) {
      console.warn('Backfill embedding failed for photo', i, e);
    }
  }
  if (updated && state.parts.find(x => x.id === part.id)) {
    try {
      await db.collection('parts-packaging').doc(part.id).update({
        embeddings: embsToMap(newEmbs),
      });
    } catch (e) {
      console.warn('Backfill save failed:', e);
    }
  }
}

function bindImportEvents() {
  document.getElementById('back-btn').addEventListener('click', () => {
    state.import = null;
    navigateTo('list');
  });
  document.querySelectorAll('.mode-option').forEach(el => {
    el.addEventListener('click', () => {
      state.import.mode = el.dataset.mode;
      if (state.import.mode === 'replace') {
        if (!confirm('現在のデータをすべて削除して、ファイルの内容に置き換えます。本当によろしいですか?')) {
          state.import.mode = 'merge';
        }
      }
      render();
    });
  });
  document.getElementById('exec-btn').addEventListener('click', executeImport);
}

function bindMenuEvents() {
  document.getElementById('sheet-overlay').addEventListener('click', (e) => {
    if (e.target.id === 'sheet-overlay') {
      state.menuOpen = false;
      render();
    }
  });
  document.querySelectorAll('.sheet-item').forEach(el => {
    el.addEventListener('click', () => {
      const action = el.dataset.action;
      state.menuOpen = false;
      render();
      if (action === 'import') document.getElementById('import-file-input').click();
      else if (action === 'export-csv') exportCSV();
      else if (action === 'export-excel') exportExcel();
    });
  });
}

function bindModalEvents() {
  document.getElementById('modal-cancel').addEventListener('click', () => {
    state.confirmDel = false;
    render();
  });
  document.getElementById('modal-confirm').addEventListener('click', async () => {
    const id = state.selectedId;
    try {
      // 写真もStorageから削除 (ベストエフォート)
      const part = state.parts.find(x => x.id === id);
      if (part && Array.isArray(part.photos)) {
        for (const photoUrl of part.photos) {
          deletePhotoFromStorage(photoUrl);  // 非同期で実行、待たない
        }
      }
      await db.collection('parts-packaging').doc(id).delete();
      state.confirmDel = false;
      state.selectedId = null;
      flash('削除しました', 'success');
      navigateTo('list');
    } catch (e) {
      flash('削除エラー: ' + e.message, 'error');
    }
  });
  // モーダル外側クリックで閉じる
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target === el) {
        state.confirmDel = false;
        state.duplicate = null;
        render();
      }
    });
  });
}

// ESC キーでモーダル/シートを閉じる (グローバル)
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (state.confirmDel || state.duplicate || state.menuOpen) {
      state.confirmDel = false;
      state.duplicate = null;
      state.menuOpen = false;
      render();
    }
  }
});

document.getElementById('import-file-input').addEventListener('change', async (e) => {
  const input = e.target;
  const file = input.files?.[0];
  if (file) await handleImportFile(file);
  input.value = '';  // 処理完了後にリセット (iOS WebKit対策)
});

// ────── クリップボードペースト対応(フォーム画面のみ) ──────
document.addEventListener('paste', async (e) => {
  if (state.view !== 'form') return;
  // テキスト入力欄にフォーカスがあれば画像ペーストは行わない (テキストペースト優先)
  const ae = document.activeElement;
  if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA')) {
    // ただしテキストが含まれていない場合(=画像オンリー)はペースト対象として処理
    const hasText = Array.from(e.clipboardData?.items || []).some(i => i.type === 'text/plain');
    if (hasText) return;
  }
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type && item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) {
        e.preventDefault();
        const f = state.form;
        if (!Array.isArray(f.photos)) f.photos = [];
        if (!Array.isArray(f.embeddings)) f.embeddings = [];
        if (f.photos.length >= 5) {
          flash('写真は最大5枚までです', 'error');
          return;
        }
        let dataUrl;
        try {
          dataUrl = await resizeImage(file);
        } catch {
          flash('写真の読み込みに失敗', 'error');
          return;
        }
        f.photos.push(dataUrl);
        f.embeddings.push([]);
        state._formDirty = true;
        render();
        flash('クリップボードから写真を追加しました', 'success');
        // 埋め込み非同期計算 (dataUrlで写真を特定し、追加・削除に耐える)
        try {
          const emb = await computeEmbedding(dataUrl);
          const idx = f.photos.indexOf(dataUrl);
          if (idx >= 0 && f.embeddings[idx]) f.embeddings[idx] = emb;
        } catch (err) {
          console.warn('Embedding failed:', err);
        }
      }
      break;
    }
  }
});

// (Service Worker は単一HTMLファイル運用のため未使用。
//  オフライン対応は Firebase の enablePersistence で実現している)

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('install-dismissed-packaging')) {
    document.getElementById('install-banner').classList.remove('hidden');
  }
});
document.getElementById('install-btn')?.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('install-banner').classList.add('hidden');
  }
});
document.getElementById('install-close')?.addEventListener('click', () => {
  localStorage.setItem('install-dismissed-packaging', '1');
  document.getElementById('install-banner').classList.add('hidden');
});

function checkIOSInstallHint() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone && !localStorage.getItem('install-dismissed-packaging')) {
    document.getElementById('install-banner').classList.remove('hidden');
    document.getElementById('install-btn').textContent = '方法';
    document.getElementById('install-btn').addEventListener('click', () => {
      alert('Safariの共有ボタン (□↑) を押し、「ホーム画面に追加」を選んでください。');
    });
  }
}

render();              // 初期ローディング画面表示
// 初期履歴エントリを記録 (back button対応)
try { history.replaceState({ view: 'list' }, '', '#list'); } catch {}
initFirebase();        // Firebase接続&リアルタイム同期開始
checkIOSInstallHint();
</script>
